[server]
http_port = 3000
domain = localhost

[auth.anonymous]
# PoC convenience — no login required when clicking through Grafana on
# localhost. Override on the VPS by removing GF_AUTH_DISABLE_LOGIN_FORM
# in docker-compose.obs.yml and adding GF_SECURITY_ADMIN_PASSWORD.
enabled = true
org_role = Admin

[security]
allow_embedding = true

[plugins]
allow_loading_unsigned_plugins =

[log]
level = warn

[unified_alerting]
enabled = true

[feature_toggles]
enable = traceqlEditor traceQLStreaming flameGraph

[explore]
enabled = true

[analytics]
reporting_enabled = false
check_for_updates = false
